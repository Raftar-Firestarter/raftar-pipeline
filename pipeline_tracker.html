*{box-sizing:border-box;margin:0;padding:0;}
/* LOCK SCREEN */

.lock-screen.hidden{display:none;}

.lock-sub{font-size:13px;color:#6b7280;margin-bottom:32px;}
.lock-icon{font-size:36px;margin-bottom:20px;}
.lock-label{font-size:11px;font-weight:600;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:0.08em;color:#6b7280;text-align:left;margin-bottom:7px;}
.lock-input{width:100%;background:#0e0f11;border:1px solid #2a2d35;border-radius:8px;padding:12px 16px;font-family:'Karla',sans-serif;font-size:15px;color:#f5f4f0;outline:none;letter-spacing:0.1em;transition:border-color 0.15s;text-align:center;}
.lock-input:focus{border-color:#3b82f6;}
.lock-input.error{border-color:#ef4444;animation:shake 0.3s ease;}

.lock-btn{width:100%;margin-top:14px;background:#f5f4f0;color:#1a1916;border:none;border-radius:8px;padding:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background 0.15s;}
.lock-btn:hover{background:#e8e7e3;}
.lock-btn:disabled{opacity:0.5;cursor:not-allowed;}
.lock-error{margin-top:12px;font-size:12px;color:#ef4444;min-height:18px;}
.lock-checking{margin-top:12px;font-size:12px;color:#6b7280;min-height:18px;}

body{background:var(--bg);color:var(--text);font-family:'Karla',sans-serif;font-size:14px;min-height:100vh;}

/* SETUP BANNER */
.setup-banner{background:#1a1916;color:#f5f4f0;padding:12px 36px;display:flex;align-items:center;gap:12px;font-size:13px;}
.setup-banner.hidden{display:none;}
.setup-banner strong{color:#fbbf24;}
.setup-banner a{color:#60a5fa;text-decoration:underline;cursor:pointer;}

/* SYNC STATUS */
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.sync-dot.live{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,0.2);}
.sync-dot.offline{background:#f59e0b;}
.sync-dot.demo{background:#94a3b8;}

/* HEADER */
.header{background:var(--text);color:var(--bg);padding:0 36px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:10px;}
.logo span{opacity:0.4;font-weight:400;font-size:13px;}
.sync-status{font-size:11px;opacity:0.7;display:flex;align-items:center;}
.header-actions{display:flex;gap:8px;align-items:center;}
.hbtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:var(--bg);padding:7px 16px;border-radius:6px;cursor:pointer;font-family:'Karla',sans-serif;font-size:13px;font-weight:500;transition:background 0.15s;}
.hbtn:hover{background:rgba(255,255,255,0.18);}
.hbtn.primary{background:var(--bg);color:var(--text);border-color:var(--bg);font-weight:600;}
.hbtn.primary:hover{background:#e8e7e3;}

/* CHANNEL TABS */
.channel-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 36px;display:flex;gap:0;overflow-x:auto;}
.ch-tab{padding:14px 22px;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all 0.15s;display:flex;align-items:center;gap:8px;}
.ch-tab:hover{color:var(--text);}
.ch-tab.active{color:var(--text);border-bottom-color:currentColor;}
.ch-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ch-count{background:var(--surface2);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:500;color:var(--muted);}
.ch-tab.active .ch-count{background:var(--text);color:var(--bg);}

/* BOARD HEADER */
.board-header{padding:24px 36px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.board-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.5px;}
.board-meta{font-size:13px;color:var(--muted);margin-top:3px;}
.board-meta strong{color:var(--text);}
.board-controls{display:flex;gap:8px;align-items:center;}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:7px 12px;font-family:'Karla',sans-serif;font-size:13px;color:var(--text);cursor:pointer;outline:none;}

/* STAGES LEGEND */

.stage-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;font-family:'Syne',sans-serif;letter-spacing:0.03em;white-space:nowrap;background:var(--surface);border:1px solid var(--border);color:var(--muted);}
.stage-chip .sdot{width:7px;height:7px;border-radius:50%;}

/* BOARD */
.board{padding:0 36px 40px;display:grid;grid-template-columns:repeat(7,minmax(220px,1fr));gap:12px;overflow-x:auto;align-items:start;}
.column{background:var(--surface2);border-radius:10px;overflow:hidden;}
.col-header{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.col-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.col-badge{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1px 8px;font-size:11px;color:var(--muted);font-family:'Karla',sans-serif;font-weight:500;}
.col-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:60px;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}

.card-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:10px;}
.card-meta{display:flex;flex-direction:column;gap:5px;}
.card-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}

.avatar{width:18px;height:18px;border-radius:50%;background:var(--text);color:var(--bg);font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;flex-shrink:0;}
.card-due.overdue{color:#ef4444;font-weight:600;}
.card-due.soon{color:#f59e0b;font-weight:500;}
.card-due.ok{color:var(--muted);}
.card-note{margin-top:8px;padding:6px 8px;background:var(--surface2);border-radius:5px;font-size:11px;color:var(--muted);font-style:italic;line-height:1.4;}
.card-timestamp{font-size:10px;color:var(--muted2);margin-top:6px;}

.add-card{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:6px;border:1px dashed var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Karla',sans-serif;font-size:12px;width:100%;transition:all 0.15s;}
.add-card:hover{background:var(--surface);color:var(--text);border-color:#bbb;}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:13px;gap:10px;}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(2px);}
.overlay.hidden{display:none;}

.modal-body{padding:24px 28px;display:flex;flex-direction:column;gap:18px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:11px;font-weight:600;font-family:'Syne',sans-serif;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);}
.field input,.field select,.field textarea{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:10px 12px;font-family:'Karla',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color 0.15s;width:100%;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#999;}
.field textarea{resize:vertical;min-height:72px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.stage-btns{display:flex;gap:4px;flex-wrap:wrap;}
.stage-btn{padding:6px 12px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);font-family:'Karla',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.stage-btn.active{color:white;border-color:transparent;}
.modal-footer{padding:16px 28px 24px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border);}
.btn-cancel{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:9px 20px;border-radius:7px;cursor:pointer;font-family:'Karla',sans-serif;font-size:13px;font-weight:500;transition:all 0.15s;}
.btn-cancel:hover{color:var(--text);}
.btn-save{background:var(--text);color:var(--bg);border:none;padding:9px 24px;border-radius:7px;cursor:pointer;font-family:'Karla',sans-serif;font-size:13px;font-weight:600;transition:background 0.15s;}
.btn-save:hover{background:#333;}
.btn-delete{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca;padding:9px 16px;border-radius:7px;cursor:pointer;font-family:'Karla',sans-serif;font-size:13px;font-weight:500;margin-right:auto;transition:all 0.15s;}
.btn-delete:hover{background:#fecaca;}
.btn-delete.hidden{display:none;}

.empty-col{text-align:center;padding:20px 10px;color:var(--muted2);font-size:12px;line-height:1.6;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:var(--bg);padding:12px 18px;border-radius:8px;font-size:13px;z-index:999;transform:translateY(80px);opacity:0;transition:all 0.3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}

  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  dot.className = 'sync-dot ' + (state === 'live' ? 'live' : state === 'connecting' ? 'offline' : 'demo');
  lbl.textContent = state === 'live' ? 'Live' : state === 'connecting' ? 'Connecting…' : 'Offline';
}

// ── AUTH ───────────────────────────────────────────────────────
function isAuthenticated() {
  return sessionStorage.getItem(SESSION_KEY) === 'true';
}

function showApp() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

async function checkPassword() {
  const input   = document.getElementById('lock-input');
  const btn     = document.getElementById('lock-btn');
  const errEl   = document.getElementById('lock-error');
  const checkEl = document.getElementById('lock-checking');
  const val     = input.value.trim();

  if (!val) {
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    return;
  }

  btn.disabled = true;
  errEl.textContent = '';
  checkEl.textContent = 'Checking…';

  try {
    const snap = await firebase.database().ref('config/password').get();
    const correct = snap.val();
    checkEl.textContent = '';

    if (!correct) {
      // No password set — let them in
      sessionStorage.setItem(SESSION_KEY, 'true');
      showApp();
      buildChannelNav();
      renderBoard();
      showToast('Tip: Set a password at Firebase → config/password');
      return;
    }

    if (val === correct) {
      sessionStorage.setItem(SESSION_KEY, 'true');
      showApp();
      buildChannelNav();
      renderBoard();
    } else {
      errEl.textContent = 'Incorrect password. Try again.';
      input.value = '';
      input.classList.add('error');
      setTimeout(() => input.classList.remove('error'), 400);
      btn.disabled = false;
    }
  } catch (e) {
    checkEl.textContent = '';
    errEl.textContent = 'Could not verify — check your connection.';
    console.error('Password check error:', e);
    btn.disabled = false;
  }
}

// ── LOCAL FALLBACK ─────────────────────────────────────────────
function saveLocal() { localStorage.setItem('pipeline_cards_v2', JSON.stringify(cards)); }

    [uid()]:{channel:'Raftar Sports',title:'PSL 2026 Preview',assignee:'Farhan Mallick',stage:'Ideation',due:d(4),uploadDate:d(14),notes:'',createdAt:Date.now(),updatedAt:Date.now(),updatedBy:'Farhan Mallick'},

// ── CHANNEL NAV ────────────────────────────────────────────────
function buildChannelNav() {
  document.getElementById('ch-nav').innerHTML = CHANNELS.map(ch => {
    const count = Object.values(cards).filter(c => c.channel === ch.id).length;
    const isActive = ch.id === activeChannel;
    return `<div class="ch-tab${isActive ? ' active' : ''}"
      style="${isActive ? `color:${ch.color};border-bottom-color:${ch.color}` : ''}"
      data-channel="${ch.id}">
      <div class="ch-dot" style="background:${ch.color}"></div>
      ${ch.label}
      <div class="ch-count">${count}</div>
    </div>`;
  }).join('');

  document.querySelectorAll('.ch-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeChannel = tab.dataset.channel;
      document.getElementById('assignee-filter').value = '';
      document.getElementById('stage-filter').value = '';
      buildChannelNav();
      renderBoard();
    });
  });
}

// ── BOARD ──────────────────────────────────────────────────────
function renderBoard() {
  const ch      = CHANNELS.find(c => c.id === activeChannel);
  const members = MEMBERS[activeChannel] || [];
  const af      = document.getElementById('assignee-filter').value;
  const sf      = document.getElementById('stage-filter').value;

  const chCards = Object.entries(cards)
    .filter(([, c]) => c.channel === activeChannel)
    .map(([id, c]) => ({ id, ...c }));

  const overdue = chCards.filter(c => c.due && c.due < todayStr() && c.stage !== 'Upload').length;

  document.getElementById('board-title').textContent = ch.label;
  document.getElementById('board-meta').innerHTML =
    `Lead: <strong>${ch.lead}</strong> &nbsp;·&nbsp; ${chCards.length} items` +
    (overdue ? ` &nbsp;·&nbsp; <span style="color:#ef4444;font-weight:600">${overdue} overdue</span>` : ' &nbsp;·&nbsp; ✓ On track');

  const afEl  = document.getElementById('assignee-filter');
  const curAf = afEl.value;
  afEl.innerHTML = '<option value="">All Members</option>' +
    members.map(m => `<option value="${m}"${m === curAf ? ' selected' : ''}>${m.split(' ')[0]}</option>`).join('');

  document.getElementById('board').innerHTML = STAGES.map(stage => {
    let filtered = chCards.filter(c => c.stage === stage.id);
    if (af) filtered = filtered.filter(c => c.assignee === af);
    if (sf && sf !== stage.id) filtered = [];
    filtered.sort((a, b) => (a.due || 'z').localeCompare(b.due || 'z'));

    return `<div class="column">
      <div class="col-header">
        <div class="col-title">
          <div style="width:8px;height:8px;border-radius:50%;background:${stage.color}"></div>
          ${stage.id}
        </div>
        <div class="col-badge">${filtered.length}</div>
      </div>
      <div class="col-body">
        ${filtered.length ? filtered.map(c => cardHTML(c, ch.color)).join('') : '<div class="empty-col">No items</div>'}
        <button class="add-card" data-stage="${stage.id}">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Add
        </button>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.add-card').forEach(btn => {
    btn.addEventListener('click', () => openModal(null, btn.dataset.stage));
  });
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => openModal(card.dataset.id));
  });
}

function cardHTML(c, chColor) {
  const initials = c.assignee ? c.assignee.split(' ').map(w => w[0]).slice(0, 2).join('') : '?';
  const dueCls   = !c.due ? 'ok' : c.due < todayStr() ? 'overdue' : daysUntil(c.due) <= 2 ? 'soon' : 'ok';
  const dueLabel = !c.due ? '' : c.due < todayStr() ? `⚠ Overdue (${c.due})` : `Due ${c.due}`;
  const ts       = c.updatedAt ? new Date(c.updatedAt).toLocaleDateString('en-PK', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
  const editor   = c.updatedBy ? ` by ${c.updatedBy}` : '';

  return `<div class="card" data-id="${c.id}" style="border-left:3px solid ${chColor}">
    <div class="card-title">${esc(c.title)}</div>
    <div class="card-meta">
      ${c.assignee ? `<div class="card-row"><div class="card-assignee"><div class="avatar" style="background:${chColor}">${initials}</div>${c.assignee.split(' ')[0]}</div></div>` : ''}
      ${dueLabel ? `<div class="card-row card-due ${dueCls}">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><rect x="1" y="2" width="10" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 1v2M8 1v2M1 5h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        ${dueLabel}</div>` : ''}
      ${c.uploadDate ? `<div class="card-row" style="color:var(--muted)">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 8V2M3 5l3-3 3 3M2 10h8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Upload: ${c.uploadDate}</div>` : ''}
    </div>
    ${c.notes ? `<div class="card-note">${esc(c.notes)}</div>` : ''}
    ${ts ? `<div class="card-timestamp">Edited${editor}, ${ts}</div>` : ''}
  </div>`;
}

// ── MODAL ──────────────────────────────────────────────────────
function openModal(id, defaultStage) {
  editingId = id;
  const card = id ? { id, ...cards[id] } : null;

  document.getElementById('modal-title').textContent = card ? card.title : 'New Content';
  document.getElementById('f-title').value       = card?.title || '';
  document.getElementById('f-channel').value     = card?.channel || activeChannel;
  document.getElementById('f-due').value         = card?.due || '';
  document.getElementById('f-upload').value      = card?.uploadDate || '';
  document.getElementById('f-notes').value       = card?.notes || '';
  document.getElementById('f-editor').value      = localStorage.getItem('pipeline_user') || '';
  document.getElementById('btn-delete').classList.toggle('hidden', !id);

  selectedStage = card?.stage || defaultStage || 'Ideation';
  refreshModalChannel();
  if (card?.assignee) document.getElementById('f-assignee').value = card.assignee;

  document.getElementById('overlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('f-title').focus(), 100);
}

function refreshModalChannel() {
  const ch      = document.getElementById('f-channel').value;
  const channel = CHANNELS.find(c => c.id === ch);
  const members = MEMBERS[ch] || [];

  document.getElementById('modal-ch').innerHTML =
    `<div style="width:8px;height:8px;border-radius:50%;background:${channel.color}"></div>
     ${channel.label} &nbsp;·&nbsp; Lead: ${channel.lead}`;

  document.getElementById('f-assignee').innerHTML =
    '<option value="">Unassigned</option>' +
    members.map(m => `<option value="${m}">${m}</option>`).join('');

  document.getElementById('stage-btns').innerHTML = STAGES.map(s => `
    <button class="stage-btn${selectedStage === s.id ? ' active' : ''}"
      style="${selectedStage === s.id ? `background:${s.color};color:white;border-color:transparent;` : `border-color:${s.color};`}"
      data-stage="${s.id}" data-color="${s.color}">${s.id}</button>
  `).join('');

  document.querySelectorAll('.stage-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedStage = btn.dataset.stage;
      document.querySelectorAll('.stage-btn').forEach(b => {
        b.classList.remove('active');
        b.style.background = '';
        b.style.color = '';
        b.style.borderColor = b.dataset.color;
      });
      btn.classList.add('active');
      btn.style.background = btn.dataset.color;
      btn.style.color = 'white';
      btn.style.borderColor = 'transparent';
    });
  });
}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  editingId = null;
}

async function saveCard() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').style.borderColor = '#ef4444'; return; }
  document.getElementById('f-title').style.borderColor = '';

  const editor = document.getElementById('f-editor').value.trim();
  if (editor) localStorage.setItem('pipeline_user', editor);

  const data = {
    channel:    document.getElementById('f-channel').value,
    title,
    assignee:   document.getElementById('f-assignee').value,
    stage:      selectedStage,
    due:        document.getElementById('f-due').value,
    uploadDate: document.getElementById('f-upload').value,
    notes:      document.getElementById('f-notes').value.trim(),
    updatedAt:  Date.now(),
    updatedBy:  editor || 'Anonymous',
  };

  try {
    if (db) {
      if (editingId) {
        await db.ref(`cards/${editingId}`).set({ ...cards[editingId], ...data });
      } else {
        data.createdAt = Date.now();
        await db.ref('cards').push(data);
      }
      showToast(editingId ? 'Updated ✓' : 'Added ✓');
    } else {
      if (editingId) {
        cards[editingId] = { ...cards[editingId], ...data };
      } else {
        cards[uid()] = { createdAt: Date.now(), ...data };
      }
      saveLocal();
      buildChannelNav();
      renderBoard();
      showToast(editingId ? 'Saved ✓' : 'Added ✓');
    }
    closeModal();
  } catch (e) {
    console.error('Save error:', e);
    showToast('Error saving — check connection');
  }
}

async function deleteCard() {
  if (!editingId || !confirm('Delete this content item?')) return;
  try {
    if (db) {
      await db.ref(`cards/${editingId}`).remove();
    } else {
      delete cards[editingId];
      saveLocal();
      buildChannelNav();
      renderBoard();
    }
    showToast('Deleted ✓');
    closeModal();
  } catch (e) {
    showToast('Error deleting');
  }
}

// ── INIT ───────────────────────────────────────────────────────
(function init() {
  // Wire up all event listeners — no inline onclick needed
  document.getElementById('lock-btn').addEventListener('click', checkPassword);
  document.getElementById('lock-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
  document.getElementById('btn-new-content').addEventListener('click', () => openModal(null));
  document.getElementById('btn-close-modal').addEventListener('click', closeModal);
  document.getElementById('btn-cancel-modal').addEventListener('click', closeModal);
  document.getElementById('btn-save-modal').addEventListener('click', saveCard);
  document.getElementById('btn-delete').addEventListener('click', deleteCard);
  document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });
  document.getElementById('f-channel').addEventListener('change', refreshModalChannel);
  document.getElementById('assignee-filter').addEventListener('change', renderBoard);
  document.getElementById('stage-filter').addEventListener('change', renderBoard);

  // Firebase connect
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
  cardsRef = db.ref('cards');
  setSyncStatus('connecting');

  cardsRef.on('value', snapshot => {
    cards = snapshot.val() || {};
    setSyncStatus('live');
    if (isAuthenticated()) {
      buildChannelNav();
      renderBoard();
    }
  }, error => {
    console.error('Firebase error:', error);
    setSyncStatus('offline');
    const stored = localStorage.getItem('pipeline_cards_v2');
    cards = stored ? JSON.parse(stored) : seedDemoData();
    if (isAuthenticated()) { buildChannelNav(); renderBoard(); }
  });

  // Show lock or app
  if (isAuthenticated()) {
    showApp();
    buildChannelNav();
    renderBoard();
  } else {
    document.getElementById('lock-input').focus();
  }
})();
</script>
